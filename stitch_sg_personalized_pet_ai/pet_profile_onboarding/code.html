<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pet Profile Setup - Little Lovely Pets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "colors": {

                        "primary-fixed": "#ffd9dd",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#554244",
                        "on-primary-container": "#782338",
                        "outline-variant": "#dac0c3",
                        "inverse-on-surface": "#f0f1f2",

                        "primary-fixed-dim": "#ffb2bd",
                        "background": "#f8f9fa",
                        "outline": "#887274",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "secondary-fixed-dim": "#edc157",
                        "on-secondary-container": "#765900",
                        "primary-container": "#ff8da1",
                        "surface-bright": "#f8f9fa",
                        "primary": "#9c3f53",
                        "on-background": "#191c1d",
                        "inverse-primary": "#ffb2bd",
                        "on-secondary-fixed": "#251a00",
                        "on-surface": "#191c1d",
                        "tertiary-container": "#99b0d9",
                        "tertiary-fixed-dim": "#b0c7f1",
                        "secondary-container": "#ffd167",
                        "secondary": "#785a00",

                    "spacing": {

                        "sm": "12px",
                        "md": "24px",
                        "lg": "48px",
                        "gutter": "16px",

                        "xs": "4px",

                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-lg": ["Quicksand"],
                        "label-sm": ["Inter"],

                        "label-lg": ["Inter"],

                    "fontSize": {

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dac0c3;
            border-radius: 3px;
        }
        
        /* Wizard transitions */
        .step-content {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .step-content.active {
            display: block;
            opacity: 1;
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top Navigation (Suppressed typical shell, showing simplified Wizard header) -->
<header class="bg-surface shadow-sm sticky top-0 z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16">
<div class="flex items-center gap-xs">
<button aria-label="Go back" class="p-2 rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Little Lovely Pets</h1>
</div>
<div class="flex items-center">
<span class="text-body-md font-body-md text-on-surface-variant">Setup</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center py-md px-margin-mobile md:px-margin-desktop overflow-y-auto">
<div class="w-full max-w-3xl">
<!-- Progress Header -->
<div class="mb-lg text-center">
<h2 class="text-headline-lg font-headline-lg text-on-background mb-xs">Let's meet your furry friend</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Tell us a bit about them so we can tailor the best care in Singapore.</p>
<!-- Progress Bar -->
<div class="mt-md relative max-w-md mx-auto">
<div class="flex justify-between mb-2">
<span class="text-label-sm font-label-sm text-primary font-bold">Basic Info</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Vitals</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Health</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Location</span>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-primary transition-all duration-500 ease-out" style="width: 25%;"></div>
</div>
</div>
</div>
<!-- Wizard Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(29,53,87,0.05)] p-md md:p-lg border border-outline-variant/30">
<!-- Step 1: Basic Info -->
<div class="step-content active" id="step-1">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Left Col: Photo & Basics -->
<div class="space-y-md">
<!-- Photo Upload Area -->
<div class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-variant transition-colors cursor-pointer relative overflow-hidden group">
<img alt="Placeholder for pet photo" class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-20 transition-opacity" data-alt="A beautifully lit, high-quality photograph of a friendly Beagle dog looking directly at the camera. The setting is a bright, modern indoor space with soft, natural daylight streaming in, creating a warm and inviting modern minimalist aesthetic. The background is slightly blurred (bokeh) emphasizing the pet's expressive face. The color palette features soft creams, gentle pinks, and warm earthy tones consistent with a premium pet care brand." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDns6lVMF2hdG1OHEC4sXq75t76bgKwMKft85OPru7uDfoEIVcvDoS7Lily-SUAdRiZV0vDKpQ8qR2B5YLIUmvEbDXFM9kcQG0wFU3OeYnOwZJ0FA_XuL0FvOlK_mc92ElLXZy5FPFbxaMVLB03RT0yvI4zVUslho91BHnWzCceCD8xwELNwBGRj9I_JW2eFBDg3iW7tnhsYkh1shIt-fpzVuYQ9q8RbRj0SPz_SsroX3s9v6LTx0cWG_n3_84LBY3WNJ_2iJQyBSs"/>
<div class="relative z-10 flex flex-col items-center pointer-events-none">
<div class="bg-surface-container-lowest p-3 rounded-full shadow-sm mb-xs text-primary">
<span class="material-symbols-outlined icon-fill text-2xl" data-icon="add_a_photo" data-weight="fill">add_a_photo</span>
</div>
<span class="text-label-lg font-label-lg text-on-surface font-semibold">Upload Photo</span>
<span class="text-label-sm font-label-sm text-on-surface-variant mt-1">Show off that cute face</span>
</div>
</div>
<!-- Name Input -->
<div>
<label class="block text-label-lg font-label-lg text-on-surface mb-xs" for="pet-name">Pet's Name</label>
<input class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring focus:ring-primary-container/50 text-body-md px-4 py-3 transition-colors outline-none" id="pet-name" placeholder="e.g., Milo" type="text"/>
</div>
</div>
<!-- Right Col: Species & Breed -->
<div class="space-y-md">
<!-- Species Selection (Bento-ish) -->
<div>
<label class="block text-label-lg font-label-lg text-on-surface mb-xs">Species</label>
<div class="grid grid-cols-2 gap-sm">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="species" type="radio" value="dog"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-transparent bg-surface peer-checked:border-primary peer-checked:bg-primary-container/20 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-3xl mb-2 text-on-surface peer-checked:text-primary" data-icon="pets">pets</span>
<span class="text-label-lg font-label-lg text-on-surface peer-checked:text-primary font-semibold">Dog</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="species" type="radio" value="cat"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-transparent bg-surface peer-checked:border-primary peer-checked:bg-primary-container/20 transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-3xl mb-2 text-on-surface peer-checked:text-primary" data-icon="cruelty_free">cruelty_free</span>
<span class="text-label-lg font-label-lg text-on-surface peer-checked:text-primary font-semibold">Cat</span>
</div>
</label>
<!-- Add more if needed, keeping it 2x2 for symmetry -->
</div>
</div>
<!-- Breed Selector -->
<div>
<label class="block text-label-lg font-label-lg text-on-surface mb-xs" for="pet-breed">Breed</label>
<div class="relative">
<select class="w-full bg-surface rounded-lg border-outline-variant/50 focus:border-primary focus:ring focus:ring-primary-container/50 text-body-md px-4 py-3 appearance-none transition-colors outline-none cursor-pointer" id="pet-breed">
<option disabled="" selected="" value="">Select breed...</option>
<option value="mixed">Mixed Breed / Singapore Special</option>
<option value="golden">Golden Retriever</option>
<option value="poodle">Poodle</option>
<option value="shiba">Shiba Inu</option>
<option value="other">Other...</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant mt-xs">Selecting "Singapore Special" helps us tailor local HDB guidelines.</p>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-lg pt-md border-t border-outline-variant/30 flex justify-end">
<!-- 'Next' button styled as primary -->
<button class="bg-gradient-to-r from-primary-container to-primary text-on-primary font-label-lg font-semibold px-8 py-3 rounded-full shadow-md hover:shadow-lg active:scale-95 transition-all flex items-center gap-2">
                        Next: Vitals
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
</body></html>
