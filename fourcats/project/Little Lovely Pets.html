<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Lovely Pets — Standardised UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@500;600;700;800&family=Baloo+2:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet" />
<style>
/* ============ STANDARDISED DESIGN TOKENS — "Modern Warmth" ============ */
:root{
  /* accent (driven by Tweaks) */
  --primary:#9c3f53;
  --primary-bright:#ff8da1;
  --primary-container:#ffe1e6;
  --on-primary-container:#782338;

  /* fixed brand support */
  --secondary:#7a5b00;            /* Tail Wag Yellow text */
  --secondary-container:#ffe49b;  /* Tail Wag Yellow fill */
  --on-secondary-container:#5b4300;
  --tertiary:#3a4f73;             /* Loyal Navy */
  --tertiary-container:#dbe6ff;
  --on-tertiary-container:#26395c;
  --success:#1f8a5b;
  --success-container:#cdeedd;
  --error:#ba1a1a;
  --error-container:#ffdad6;

  /* neutrals (warm) */
  --bg:#f7f6f7;
  --surface:#ffffff;
  --surface-2:#f3f1f2;
  --surface-3:#ece9ea;
  --ink:#191417;
  --ink-2:#5b4f53;
  --ink-3:#8d8186;
  --outline:#e4dcdf;
  --outline-2:#d9ced2;

  /* shape (driven by Tweaks: roundness) */
  --r-mult:1;
  --r-xs:calc(6px * var(--r-mult));
  --r-sm:calc(10px * var(--r-mult));
  --r-md:calc(16px * var(--r-mult));
  --r-lg:calc(22px * var(--r-mult));
  --r-xl:calc(30px * var(--r-mult));
  --r-pill:999px;

  /* spacing (driven by Tweaks: density) */
  --u:8px;
  --pad-card:24px;
  --gap:20px;

  /* cuteness 0..100 (driven by Tweaks) */
  --cute:0.8;
  --blush:calc(var(--cute) * 1);
  --bounce:calc(var(--cute) * 1);

  /* elevation */
  --sh-1:0 4px 20px rgba(40,28,33,.05);
  --sh-2:0 10px 34px rgba(40,28,33,.10);
  --sh-pop:0 16px 44px rgba(120,35,56,.18);

  --side-w:248px;
  --font-d:'Quicksand',system-ui,sans-serif;
  --font-b:'Inter',system-ui,sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--font-b);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root{height:100%;}
.font-d{font-family:var(--font-d);}
.material-symbols-rounded{font-variation-settings:'opsz' 24,'wght' 400,'FILL' 0,'GRAD' 0;line-height:1;user-select:none;}
.fill .material-symbols-rounded,.material-symbols-rounded.fill{font-variation-settings:'FILL' 1;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--outline-2);border-radius:999px;border:3px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-3);background-clip:content-box;}

/* shared animations */
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
@keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes wag{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(.1);}}
@keyframes shimmer{100%{background-position:200% 0;}}
.card-in{animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;}}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}
a{color:inherit;text-decoration:none;}
</style>
</head>

<div id="root"></div>
